<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Escudo del Estado La Guaira -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0052D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003DA5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo del escudo -->
  <path d="M60 10 L100 30 L100 80 Q100 95 85 100 L60 110 L35 100 Q20 95 20 80 L20 30 Z" fill="url(#blueGrad)" stroke="#002B73" stroke-width="2"/>
  
