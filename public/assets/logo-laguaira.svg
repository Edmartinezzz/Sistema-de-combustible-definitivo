  <path d="M30 78 Q35 73 40 78 Q45 83 50 78 Q55 73 60 78 Q65 83 70 78 Q75 73 80 78 Q85 83 90 78" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Montañas (Ávila) -->
