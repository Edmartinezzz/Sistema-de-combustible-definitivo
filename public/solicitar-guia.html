<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Guía de Movilización - La Guaira</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 15px;
            background: #f5f7fa;
            font-family: 'Inter', sans-serif;
            overflow-y: auto;
        }
        .form-container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px;
        }
        .form-header {
            border-bottom: 3px solid #1a5f7a;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .form-header h1 {
            margin: 0;
            color: #1a5f7a;
            font-size: 24px;
        }
        .form-section {
            margin-bottom: 25px;
        }
        .form-section h4 {
            margin-bottom: 15px;
            color: #1a5f7a;
            border-bottom: 2px solid #1a5f7a;
            padding-bottom: 5px;
            font-size: 18px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #1a5f7a;
            box-shadow: 0 0 0 3px rgba(26, 95, 122, 0.1);
        }
        textarea.form-control {
            resize: vertical;
        }
        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #1a5f7a;
            color: white;
        }
        .btn-primary:hover {
            background: #155066;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1a5f7a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="form-container">
        <div class="form-header">
            <h1>Solicitar Guía de Movilización</h1>
        </div>

        <div id="alert-container"></div>

        <form id="guia-form">
            <!-- DESCRIPCIÓN DEL MATERIAL -->
            <div class="form-section">
                <h4>Descripción del Material</h4>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tipo de Mineral *</label>
                        <select name="tipo_mineral" class="form-control" required>
                            <option value="">Seleccione...</option>
                            <option value="Piedra Picada">Piedra Picada</option>
                            <option value="Arrocillo">Arrocillo</option>
                            <option value="Arena 2&quot;">Arena 2"</option>
                            <option value="Arena 2/4">Arena 2/4</option>
                            <option value="Arena 5&quot;">Arena 5"</option>
                            <option value="Agregado 4/8">Agregado 4/8</option>
                            <option value="Agregado 8/15">Agregado 8/15</option>
                            <option value="Agregado 5/15">Agregado 5/15</option>
                            <option value="Agregado 15/25">Agregado 15/25</option>
                            <option value="Arena Integral">Arena Integral</option>
                            <option value="Granzón">Granzón</option>
                            <option value="P100">P100</option>
                            <option value="P3000">P3000</option>
                            <option value="Coraza">Coraza</option>
                            <option value="Arena Cernida">Arena Cernida</option>
                            <option value="Canto Rodado">Canto Rodado</option>
                            <option value="Polvillo">Polvillo</option>
                            <option value="Arena Amarilla">Arena Amarilla</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cantidad *</label>
                        <input type="number" step="0.01" name="cantidad" class="form-control" required placeholder="Ej: 10.5">
                    </div>
                    <div class="form-group">
                        <label>Unidad de Medida *</label>
                        <select name="unidad" class="form-control" required>
                            <option value="toneladas">Toneladas</option>
                            <option value="m³">Metros Cúbicos (m³)</option>
                            <option value="kg">Kilogramos</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- RUTAS DE TRASLADO -->
            <div class="form-section">
                <h4>Rutas de Traslado</h4>
                <div class="form-group">
                    <label>Dirección de Origen *</label>
                    <input type="text" name="origen" class="form-control" required placeholder="Dirección completa del origen">
                </div>
                <div class="form-group">
                    <label>Dirección de Destino *</label>
                    <input type="text" name="destino" class="form-control" required placeholder="Dirección completa del destino">
                </div>
            </div>

            <!-- DATOS DEL VEHÍCULO -->
            <div class="form-section">
                <h4>Datos del Vehículo</h4>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Marca *</label>
                        <input type="text" name="vehiculo_marca" class="form-control" required placeholder="Ej: Ford, Chevrolet">
                    </div>
                    <div class="form-group">
                        <label>Modelo *</label>
                        <input type="text" name="vehiculo_modelo" class="form-control" required placeholder="Ej: F-350, NPR">
                    </div>
                    <div class="form-group">
                        <label>Color *</label>
                        <input type="text" name="vehiculo_color" class="form-control" required placeholder="Ej: Blanco, Rojo">
                    </div>
                    <div class="form-group">
                        <label>Placa *</label>
                        <input type="text" name="vehiculo_placa" class="form-control" required placeholder="Ej: A1B2C3D" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Carrocería *</label>
                        <select name="vehiculo_carroceria" class="form-control" required>
                            <option value="">Seleccione...</option>
                            <option value="Volteo">Volteo</option>
                            <option value="Plataforma">Plataforma</option>
                            <option value="Cava">Cava</option>
                            <option value="Cisterna">Cisterna</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- DATOS DEL CONDUCTOR -->
            <div class="form-section">
                <h4>Datos del Conductor</h4>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombres y Apellidos *</label>
                        <input type="text" name="conductor_nombre" class="form-control" required placeholder="Nombre completo del conductor">
                    </div>
                    <div class="form-group">
                        <label>Cédula de Identidad *</label>
                        <input type="text" name="conductor_cedula" class="form-control" required placeholder="Ej: V-12345678">
                    </div>
                </div>
            </div>

            <!-- OBSERVACIONES -->
            <div class="form-section">
                <h4>Observaciones</h4>
                <div class="form-group">
                    <textarea name="observaciones" class="form-control" rows="3" placeholder="Observaciones adicionales (opcional)"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="window.close()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Solicitar Guía</button>
            </div>
        </form>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('authToken');

        // Verificar autenticación al cargar
        if (!authToken) {
            alert('No hay sesión activa. Por favor, inicie sesión.');
            window.close();
        }

        // Función para mostrar alertas
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            // Convertir saltos de línea en <br> para HTML
            alert.innerHTML = message.replace(/\n/g, '<br>');
            container.innerHTML = '';
            container.appendChild(alert);
            
            // Scroll al inicio para ver el mensaje
            window.scrollTo(0, 0);
            
            if (type === 'success') {
                setTimeout(() => {
                    alert.remove();
                }, 8000);
            }
        }

        // Función para mostrar/ocultar loading
        function showLoading(show) {
            const overlay = document.getElementById('loading-overlay');
            if (show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        // Función para formatear números
        function formatNumber(num) {
            return new Intl.NumberFormat('es-VE').format(num);
        }

        // Manejar envío del formulario
        document.getElementById('guia-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            showLoading(true);
            showAlert('', 'success'); // Limpiar alertas anteriores

            try {
                const response = await fetch(`${API_BASE}/guias/solicitar`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    const mensaje = `✅ Guía solicitada exitosamente.\n\n📋 Número de Guía: ${result.guia.numero_guia}\n💰 Monto a pagar: Bs. ${formatNumber(result.guia.monto_pagar)}\n🏦 Banco: ${result.guia.banco}\n💳 Cuenta: ${result.guia.cuenta}\n\nPor favor, realice el pago y suba el comprobante en el panel principal.`;
                    showAlert(mensaje, 'success');
                    
                    // Notificar a la ventana padre si existe
                    if (window.opener) {
                        window.opener.postMessage({ type: 'guia-solicitada', data: result }, '*');
                    }
                    
                    // Cerrar después de 5 segundos para que el usuario pueda leer el mensaje
                    setTimeout(() => {
                        if (window.opener) {
                            window.close();
                        }
                    }, 5000);
                } else {
                    showAlert(result.error || 'Error al solicitar guía', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error al solicitar guía: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });
    </script>
</body>
</html>
